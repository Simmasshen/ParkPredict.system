<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkPredict | Join MMU Parking</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hero-bg">
    <div class="glass-container">
        <header>
            <h1 class="glow-text">Create Account</h1>
            <p>Join the MMU Cyberjaya Smart Network</p>
        </header>

        <div class="auth-box">
            <div class="input-group">
                <div class="field-label">Student ID</div>
                <input type="text" id="username" placeholder="e.g. 1211XXXXXX" required>
                
                <div class="field-label">Secure Password</div>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button class="btn btn-primary" onclick="register()">CREATE ACCOUNT</button>
            
            <div class="auth-links">
                <a href="index.html">Already a member? Login here</a>
            </div>
            
            <p id="msg" class="status-msg"></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
