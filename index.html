<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkPredict | MMU Cyberjaya</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hero-bg">
    <div class="glass-container">
        <header>
            <h1 class="glow-text">ParkPredict 🚗</h1>
            <p>Smart Campus Tracking for MMU Cyberjaya</p>
        </header>

        <div class="auth-box">
            <div class="input-group">
                <input type="text" id="username" placeholder="MMU Student ID" required>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <button class="btn btn-primary" onclick="login()">ENTER DASHBOARD</button>
            <div class="auth-links">
                <a href="register.html">New Student? Register Here</a>
            </div>
            <p id="msg" class="error-msg"></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
