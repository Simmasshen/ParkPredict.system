<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkPredict Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">ParkPredict <span>MMU</span></div>
        <div class="nav-user" id="display-user">FCI Front-End Lead</div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="glass-card">
                <h3>Quick Action</h3>
                <select id="zone" class="tech-select">
                    <option value="FCI">FCI Lot</option>
                    <option value="FOM">FOM Lot</option>
                    <option value="DTC">Grand Hall (DTC)</option>
                </select>
                <button class="btn btn-checkin" onclick="checkin()">CHECK IN</button>
                <button class="btn btn-checkout" onclick="checkout()">CHECK OUT</button>
                <input type="text" id="log_id" placeholder="Log ID (for Check-out)" class="mini-input">
            </div>
        </aside>

        <main class="content-grid">
            <div class="glass-card prediction-card">
                <h3>Current Probability</h3>
                <div class="big-percent" id="rec">72%</div>
                <p>Chance of finding a spot now</p>
                <button class="btn-refresh" onclick="getRecommendation()">REFRESH PREDICTION</button>
            </div>

            <div class="glass-card chart-container">
                <h3>Parking Usage Trends</h3>
                <canvas id="peakChart"></canvas>
            </div>

            <div class="glass-card history-list">
                <h3>Live Zone Status</h3>
                <div id="status" class="status-monitor">
                    </div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
